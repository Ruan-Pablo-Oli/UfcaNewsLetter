[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "ufcanewsletter.settings"
pythonpath = ["app"]
python_files = ["test_*.py", "*_test.py", "tests.py"]

[tool.ruff]
line-length = 100
target-version = "py312"
# Migrations são geradas pelo Django (makemigrations) e naturalmente excedem
# o limite de linha; não faz sentido lintá-las.
extend-exclude = ["**/migrations/**"]

[tool.ruff.lint]
select = ["E", "F", "I"]
