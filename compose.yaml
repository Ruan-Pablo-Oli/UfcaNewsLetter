services:
  db:
    image: postgres:16-alpine
    container_name: ufcanewsletter-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ufcanewsletter}
      - POSTGRES_USER=${POSTGRES_USER:-ufcanewsletter}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ufcanewsletter}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ufcanewsletter} -d $${POSTGRES_DB:-ufcanewsletter}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ufcanewsletter:latest
    container_name: ufcanewsletter-web
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-*}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
