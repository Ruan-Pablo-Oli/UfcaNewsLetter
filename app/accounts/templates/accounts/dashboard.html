<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Painel</title>
</head>
<body>
  <h1>Olá, {{ user.username }}</h1>
  <p>Papel: {{ papel }}</p>
  <p>Curso: {{ perfil.get_curso_display|default:"-" }}</p>
  <p><a href="{% url 'perfil_editar' %}">Editar perfil</a></p>
  <form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit">Sair</button>
  </form>
</body>
</html>
